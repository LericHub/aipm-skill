# 团队 ID（从 get-profile 或 create-file 响应中获取）
TEAM_ID: "e6e20326-0802-8183-8007-f691bd15fa70"

# 项目 ID（从 URL 或 create-file 响应中获取）
PROJECT_ID: "0075361e-ccf8-8015-8007-e050cd608729"

# 页面 ID
PAGE_ID: "9df005f7-9c6f-80fa-8007-f695c370efe3"


# ============================================================
# API 基础配置（通常无需修改）
# ============================================================

base_url: "${PENPOT_BASE_URL}/api/rpc"

auth:
  type: Token
  env_var: PENPOT_ACCESS_TOKEN
  header: "Authorization: Token ${PENPOT_ACCESS_TOKEN}"

headers:
  Content-Type: application/json
  Accept: application/json

# ============================================================
# API 端点
# ============================================================

endpoints:
  # 文件管理
  create_file:
    method: POST
    path: /command/create-file
    params:
      name: string        # 必填，文件名
      project-id: string  # 必填，项目ID（UUID格式）
      id: string          # 可选，文件ID
      is-shared: boolean  # 可选，是否共享
      features: array     # 可选，功能特性列表

  get_file:
    method: POST
    path: /query/get-file
    params:
      id: string          # 必填，文件ID

  list_files:
    method: POST
    path: /query/list-files
    params:
      project-id: string  # 必填，项目ID

  rename_file:
    method: POST
    path: /command/rename-file
    params:
      id: string          # 必填，文件ID
      name: string        # 必填，新文件名

  delete_file:
    method: POST
    path: /command/delete-file
    params:
      id: string          # 必填，文件ID

  # 页面管理
  add_page:
    method: POST
    path: /command/add-page
    params:
      id: string          # 必填，文件ID
      name: string        # 必填，页面名称

  list_pages:
    method: POST
    path: /query/list-pages
    params:
      file-id: string     # 必填，文件ID

  rename_page:
    method: POST
    path: /command/rename-page
    params:
      file-id: string     # 必填，文件ID
      page-id: string     # 必填，页面ID
      name: string        # 必填，新页面名称

  delete_page:
    method: POST
    path: /command/delete-page
    params:
      file-id: string     # 必填，文件ID
      page-id: string     # 必填，页面ID

  # 用户资料
  get_profile:
    method: POST
    path: /query/get-profile
    params: {}            # 无需参数

  # 文件分享
  create_share_link:
    method: POST
    path: /command/create-share-link
    params:
      file-id: string     # 必填，文件ID

# ============================================================
# 错误码
# ============================================================

error_codes:
  validation: "参数验证失败，请检查请求参数格式"
  not-found: "对象不存在，请检查 ID 是否正确"
  object-not-found: "对象不存在，请检查项目ID或文件ID"
  unauthorized: "未授权，请检查 Access Token 是否有效"
  forbidden: "权限不足，无法访问指定资源"

# ============================================================
# URL 格式
# ============================================================

url_formats:
  workspace: "${PENPOT_BASE_URL}/#/workspace?team-id={teamId}&file-id={fileId}"
  view: "${PENPOT_BASE_URL}/#/view?file-id={fileId}&page-id={pageId}"
  dashboard: "${PENPOT_BASE_URL}/#/dashboard/files?team-id={teamId}&project-id={projectId}"
