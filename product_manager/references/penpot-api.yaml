TEAM_ID: "e6e20326-0802-8183-8007-f691bd15fa70"

# 项目 ID（从 URL 或 create-file 响应中获取）
PROJECT_ID: "9df005f7-9c6f-80fa-8007-f699acc56def"


# ============================================================
# API 基础配置（通常无需修改）
# ============================================================

# 所有 API 端点统一使用 /api/rpc/command/ 路径
# 必须携带 Accept: application/json 以获取 JSON 响应（默认返回 transit 格式）
base_url: "${PENPOT_BASE_URL}/api/rpc/command"

auth:
  type: Token
  env_var: PENPOT_ACCESS_TOKEN
  header: "Authorization: Token ${PENPOT_ACCESS_TOKEN}"

headers:
  Content-Type: application/json
  Accept: application/json

# ============================================================
# API 端点（v2.15 实测验证）
# ============================================================

endpoints:
  # ---------- 用户资料 ----------
  get_profile:
    method: POST
    path: /get-profile
    params: {}

  # ---------- 文件管理 ----------
  create_file:
    method: POST
    path: /create-file
    params:
      name: string        # 必填，文件名（最长250字符）
      project-id: string  # 必填，项目ID（UUID格式）

  get_file:
    method: POST
    path: /get-file
    params:
      id: string          # 必填，文件ID
      page-id: string     # 可选，页面ID

  get_file_info:
    method: POST
    path: /get-file-info
    params:
      id: string          # 必填，文件ID
    note: 轻量查询，仅返回 id。页面列表需通过 get_file 获取

  get_file_summary:
    method: POST
    path: /get-file-summary
    params:
      id: string          # 必填，文件ID

  rename_file:
    method: POST
    path: /rename-file
    params:
      id: string          # 必填，文件ID
      name: string        # 必填，新文件名

  delete_file:
    method: POST
    path: /delete-file
    params:
      id: string          # 必填，文件ID

  # ---------- 页面信息获取 ----------
  # 注意：add_page / rename_page / delete_page / list_pages 在 v2.15 中不存在为独立 API
  # 页面列表通过 get_file 响应中的 data.pages + data.pagesIndex 获取
  # 页面增删改通过 Penpot MCP Plugin 的 change 机制执行

  # ---------- 团队 ----------
  get_team_members:
    method: POST
    path: /get-team-members
    params:
      team-id: string     # 必填，团队ID

  # ---------- 分享 ----------
  create_share_link:
    method: POST
    path: /create-share-link
    params:
      file-id: string     # 必填，文件ID

# ============================================================
# 错误码
# ============================================================

error_codes:
  validation: "参数验证失败，请检查请求参数格式"
  not-found: "对象不存在，请检查 ID 是否正确"
  object-not-found: "对象不存在，请检查项目ID或文件ID"
  unauthorized: "未授权，请检查 Access Token 是否有效"
  forbidden: "权限不足，无法访问指定资源"

# ============================================================
# URL 格式
# ============================================================

url_formats:
  workspace: "${PENPOT_BASE_URL}/#/workspace?team-id={teamId}&file-id={fileId}"
  view: "${PENPOT_BASE_URL}/#/view?file-id={fileId}&page-id={pageId}"
  dashboard: "${PENPOT_BASE_URL}/#/dashboard/files?team-id={teamId}&project-id={projectId}"
